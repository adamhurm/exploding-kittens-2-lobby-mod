<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EKLobbyMod — Overlay Preview</title>
<style>
  /* ── Reset ── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── EK brand palette (source: src/EKLobbyMod/OverlayPanel.cs) ── */
  :root {
    --ek-black:     rgba(15,  15,  15,  0.97); /* EkBlack    0.059,0.059,0.059 */
    --ek-red:       #81242D;                   /* EkRed      0.506,0.141,0.176 */
    --ek-off-white: #FCF8EE;                   /* EkOffWhite 0.988,0.972,0.933 */
    --ek-dark:      #242424;                   /* EkDark     0.14,0.14,0.14    */
    --ek-red-dark:  #52141A;                   /* EkRedDark  0.32,0.08,0.10    */
    --ek-green:     #1E7A1E;                   /* Rejoin-active 0.12,0.48,0.12 */
    --ek-yellow:    #FFD94D;                   /* Rejoin prompt 1,0.85,0.3     */
    --ek-row-a:     #292929;                   /* Friend row even  0.16,0.16   */
    --ek-row-b:     #1C1C1C;                   /* Friend row odd   0.11,0.11   */
  }

  /* ── Page ── */
  body {
    background: #111;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 32px;
    color: var(--ek-off-white);
  }
  h1 {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #666;
    margin-bottom: 4px;
  }
  .subtitle {
    font-size: 11px;
    color: #444;
    margin-bottom: 32px;
  }

  /* ── States grid ── */
  .states-grid {
    display: flex;
    gap: 40px;
    flex-wrap: wrap;
    align-items: flex-end;
  }
  .state-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .state-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #555;
  }

  /* ── State 1: Minimized tab (220×40) ── */
  .min-tab {
    width: 220px;
    height: 40px;
    background: var(--ek-black);
    display: flex;
    align-items: center;
    border: 1px solid #222;
    cursor: pointer;
  }
  .min-tab .accent {
    width: 4px;
    height: 100%;
    background: var(--ek-red);
    flex-shrink: 0;
  }
  .min-tab .code-text {
    flex: 1;
    text-align: center;
    font-size: 13px;
    color: var(--ek-off-white);
    letter-spacing: 1px;
  }

  /* ── States 2–4: Expanded panel (300×400) ── */
  .expanded-panel {
    width: 300px;
    height: 400px;
    background: var(--ek-black);
    border: 1px solid #222;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* Header strip */
  .header-strip {
    height: 44px;
    background: var(--ek-red);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    flex-shrink: 0;
  }
  .header-title {
    font-size: 17px;
    font-weight: bold;
    color: var(--ek-off-white);
    letter-spacing: 1px;
  }
  .minimize-btn {
    width: 32px;
    height: 30px;
    background: rgba(0,0,0,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .minimize-bar {
    width: 65%;
    height: 3px;
    background: var(--ek-off-white);
  }

  /* Code row */
  .code-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 6px 6px 4px;
    flex-shrink: 0;
  }
  .code-label {
    font-size: 13px;
    color: var(--ek-off-white);
    white-space: nowrap;
    flex: 1;
  }
  .copy-btn, .icon-btn {
    font-size: 11px;
    color: var(--ek-off-white);
    background: var(--ek-dark);
    border: none;
    cursor: pointer;
    height: 22px;
    padding: 0 6px;
  }
  .icon-btn { width: 28px; }

  /* Friend list */
  .friend-list {
    flex: 1;
    overflow: hidden;
    margin: 0 6px;
  }
  .friend-row {
    display: flex;
    align-items: center;
    height: 22px;
    padding: 0 4px;
    font-size: 11px;
    color: var(--ek-off-white);
  }
  .friend-row:nth-child(odd)  { background: var(--ek-row-a); }
  .friend-row:nth-child(even) { background: var(--ek-row-b); }
  .friend-row.offline { color: #8a8a8a; }
  .friend-name { flex: 1; }
  .kick-btn {
    font-size: 9px;
    background: var(--ek-red);
    color: var(--ek-off-white);
    border: none;
    padding: 0 4px;
    height: 20px;
    cursor: pointer;
    margin-right: 4px;
  }
  .remove-btn {
    font-size: 10px;
    background: var(--ek-red-dark);
    color: var(--ek-off-white);
    border: none;
    width: 20px;
    height: 20px;
    cursor: pointer;
  }
  .add-btn {
    font-size: 12px;
    color: var(--ek-off-white);
    background: var(--ek-dark);
    border: none;
    padding: 0 8px;
    height: 22px;
    margin: 4px 6px 2px;
    cursor: pointer;
    align-self: flex-start;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- MOCK DATA — edit these to test different scenarios
     Lobby code : EK-A3F9C12B
     Friends    : Alice (online), Bob (online + in room → kick btn), Carol (offline), Dave (offline)

          <span class="friend-name">○ Carol</span>

        <div class="friend-row offline">

          <button class="remove-btn">✕</button>
        </div>
      </div>
      <button class="add-btn">+ Add</button>
      <!-- rejoin prompt and action row added in Task 5 -->
    </div>
    <span class="state-label">2 — Expanded</span>
  </div>

  <!-- states 3–4 added in subsequent tasks -->
</div>

</body>
</html>
